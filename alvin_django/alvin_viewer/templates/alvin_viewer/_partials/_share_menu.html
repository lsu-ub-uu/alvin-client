{% load i18n %}
<dialog data-xshow="share" data-xtransition:enter="transition ease-out duration-150"
    data-xtransition:enter-start="opacity-0" data-xtransition:enter-end="opacity-100"
    data-xtransition:leave="transition ease-in duration-150" data-xtransition:leave-start="opacity-100"
    data-xtransition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-center justify-center w-screen h-screen bg-black/80 dark:bg-gray-900/80 focus:outline-none"
    data-xon.click="share = false" data-xon.keydown.escape.window="share = false" data-xcloak>
    <div class="w-10/12 h-10/12 p-10 bg-alvin-grey dark:bg-gray-800 shadow-xl flex flex-col gap-4" data-xon.click.stop>
        <div>
            <h2 class="text-2xl font-bold mb-4">{% translate 'Dela' %}</h2>
            <div class="flex flex-col justify-start">
                <div class="md-row">
                    <dt class="md-label">URI</dt>
                    <dd data-xdata="{ copied: false }" class="md-value flex flex-row gap-x-1 justify-start" id="uri">
                    <span data-xref="uri_text" class="truncate">{{ request.get_host }}/{{ metadata.record_type }}/{{ metadata.id }}</span>
                    <button
                    data-xon.click="navigator.clipboard.writeText($refs.uri_text.innerText.trim()); copied = true; setTimeout(() => copied = false, 2000)"
                    class="btn flex items-right justify-end">
                        <span data-xshow="!copied">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                                stroke="currentColor" class="size-6 float-right">
                                <title>Copy</title>
                                <path stroke-linecap="round" stroke-linejoin="round"
                                d="M15.666 3.888A2.25 2.25 0 0 0 13.5 2.25h-3c-1.03 0-1.9.693-2.166 1.638m7.332 0c.055.194.084.4.084.612v0a.75.75 0 0 1-.75.75H9a.75.75 0 0 1-.75-.75v0c0-.212.03-.418.084-.612m7.332 0c.646.049 1.288.11 1.927.184 1.1.128 1.907 1.077 1.907 2.185V19.5a2.25 2.25 0 0 1-2.25 2.25H6.75A2.25 2.25 0 0 1 4.5 19.5V6.257c0-1.108.806-2.057 1.907-2.185a48.208 48.208 0 0 1 1.927-.184" />
                            </svg>
                        </span>
                        <span data-xshow="copied">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 text-green-500">
                                <title>Copied!</title>
                                <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                            </svg>
                        </span>
                    </button>
                    </dd>
                </div>
                {% include "./_metadata_row.html" with label=metadata.urn_nbn.label value=metadata.urn_nbn.text %}
                <div class="md-row">
                    <dt class="md-label">Alvin-ID</dt>
                    <dd class="md-value">
                        {{ metadata.record_type }}:{{ metadata.id }}
                    </dd>
                </div>
            </div>
        </div>
    </div>
</dialog>
