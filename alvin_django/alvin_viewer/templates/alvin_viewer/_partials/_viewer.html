{% load i18n static %}

<aside id="viewer-fullscreen-container" 
        data-xdata="documentViewer" 
        data-xon.beforeunload.window="cleanup()"
        data-xon.osd-loaded.window="totalPages = $event.detail.totalPages; currentPage = 1"
        data-xon.osd-page-changed.window="currentPage = $event.detail.page + 1"
        class="w-full h-[60vh] lg:h-[80vh] flex relative overflow-hidden rounded-sm">
    
    <div id="osd-wrapper" class="flex-1 relative overflow-hidden bg-gray-200 dark:bg-black">
    
        <div class="absolute top-4 left-4 z-40 bg-black/70 p-1.5 rounded-full flex flex-col items-center gap-1 text-white border border-white/20 shadow-xl backdrop-blur-xs">
            
            <button data-xon.click="toggleFullscreen()" class="p-2 hover:text-orange-500 hover:bg-white/10 rounded-full transition-all" title="Fullskärm">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                </svg>
            </button>

            <div class="w-5 h-px bg-white/40 my-0.5"></div>

            <button data-xon.click="osdZoomIn()" class="p-2 hover:text-orange-500 hover:bg-white/10 rounded-full transition-all" title="Zooma in">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM10.5 7.5v6m3-3h-6" />
                </svg>
            </button>
            <button data-xon.click="osdZoomOut()" class="p-2 hover:text-orange-500 hover:bg-white/10 rounded-full transition-all" title="Zooma ut">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM13.5 10.5h-6" />
                </svg>
            </button>

            <div class="w-5 h-px bg-white/40 my-0.5"></div>

            <button data-xon.click="osdHome()" class="p-2 hover:text-orange-500 hover:bg-white/10 rounded-full transition-all" title="Återställ vy">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                </svg>
            </button>

            <div class="w-5 h-px bg-white/40 my-0.5"></div>

            <button data-xon.click="osdRotateLeft()" class="p-2 hover:text-orange-500 hover:bg-white/10 rounded-full transition-all" title="Rotera moturs">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
                </svg>
            </button>
            <button data-xon.click="osdRotateRight()" class="p-2 hover:text-orange-500 hover:bg-white/10 rounded-full transition-all" title="Rotera medurs">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l6-6m0 0l-6-6m6 6H9a6 6 0 000 12h3" />
                </svg>
            </button>
        </div>


        <div data-xbind.class="sidebarOpen ? 'right-52' : 'right-4'" class="absolute top-4 z-40 flex flex-col items-end gap-2 transition-all duration-300">
            
            <button data-xon.click="toggleSidebar()" class="bg-black/70 hover:bg-black text-white hover:text-orange-500 px-3 py-2 rounded-full shadow-xl border border-white/20 backdrop-blur-xs transition-all flex items-center gap-2" title="Visa/Dölj tumnaglar">
                <svg width="20px" height="20px" stroke-width="2" viewBox="0 0 24 24" fill="none">
                    <path d="M21 7.6V20.4C21 20.7314 20.7314 21 20.4 21H7.6C7.26863 21 7 20.7314 7 20.4V7.6C7 7.26863 7.26863 7 7.6 7H20.4C20.7314 7 21 7.26863 21 7.6Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M18 4H4.6C4.26863 4 4 4.26863 4 4.6V18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M7 16.8L12.4444 15L21 18" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></path>
                    <path d="M16.5 13C15.6716 13 15 12.3284 15 11.5C15 10.6716 15.6716 10 16.5 10C17.3284 10 18 10.6716 18 11.5C18 12.3284 17.3284 13 16.5 13Z" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                <span class="text-sm font-semibold whitespace-nowrap" data-xtext="sidebarOpen ? 'Dölj tumnaglar' : 'Visa tumnaglar'"></span>
            </button>

            {% if metadata.files.transcriptions.files %}
            <button data-xon.click="toggleDoc()" class="bg-black/70 hover:bg-black text-white hover:text-orange-500  px-3 py-2 rounded-full shadow-xl border border-white/20 backdrop-blur-xs transition-all flex items-center gap-2" title="Visa/Dölj dokument">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <span class="text-sm font-semibold whitespace-nowrap" data-xtext="docOpen ? 'Dölj dokument' : 'Visa dokument'"></span>
            </button>
            {% endif %}
        </div>

        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-40 bg-black/70 py-1.5 px-2 rounded-full flex items-center gap-1 text-white border border-white/20 shadow-xl backdrop-blur-xs">
            
            <button data-xon.click="prevPage()" 
                    data-xbind.disabled="currentPage <= 1"
                    data-xbind.class="currentPage <= 1 ? 'opacity-30 cursor-not-allowed' : 'hover:text-orange-500 hover:bg-white/10'"
                    class="p-1.5 rounded-full transition-all" title="Föregående bild">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </button>

            <div class="flex items-center gap-1 px-1" title="Byt sida">
                <input type="number" 
                       data-xmodel="currentPage" 
                       data-xon.change="goToPage(currentPage)" 
                       data-xbind.max="totalPages"
                       class="w-12 text-center text-sm font-semibold text-black px-1 py-0.5 rounded outline-hidden" min="1">
                <span class="text-sm font-semibold text-gray-300">/ <span data-xtext="totalPages"></span></span>
            </div>

            <button data-xon.click="nextPage()" 
                    data-xbind.disabled="currentPage >= totalPages"
                    data-xbind.class="currentPage >= totalPages ? 'opacity-30 cursor-not-allowed' : 'hover:text-orange-500 hover:bg-white/10'"
                    class="p-1.5 rounded-full transition-all" title="Nästa bild">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
            </button>
        </div>


        <div id="tify-viewer" class="w-full h-full absolute inset-0" data-manifest-url="{% url 'iiif_manifest' metadata.id %}"></div>

        <div id="thumb-sidebar" data-xbind.class="sidebarOpen ? 'translate-x-0' : 'translate-x-full'" class="absolute top-0 right-0 h-full z-30 w-48 bg-gray-300/95 dark:bg-gray-900/95 shadow-md dark:border-l dark:border-gray-700 overflow-y-auto ease-in-out duration-300 transition-transform">
            <div id="thumb-list" class="flex flex-col gap-4 p-4"></div>
        </div>
    </div>
    
    {% if metadata.files.transcriptions.files %}
    <div id="pdf-container" 
         data-xshow="docOpen" 
         data-xtransition:enter="transition-all duration-300 ease-in-out"
         data-xtransition:enter-start="translate-x-full md:translate-x-0 md:-mr-[50%]"
         data-xtransition:enter-end="translate-x-0 md:mr-0"
         data-xtransition:leave="transition-all duration-300 ease-in-out"
         data-xtransition:leave-start="translate-x-0 md:mr-0"
         data-xtransition:leave-end="translate-x-full md:translate-x-0 md:-mr-[50%]"
         style="display: none;" 
         class="flex flex-col md:shrink-0 absolute md:relative right-0 inset-y-0 w-full h-full md:w-1/2 md:max-w-[50%] shadow-2xl z-40">
    
        <div id="pdf-header" class="bg-dark-alvin dark:bg-gray-900/5 p-2 flex items-center justify-between text-[#FAF9F6] shrink-0 min-w-0">
            <div class="flex items-center flex-1 min-w-0">
                <label for="pdf-selector" class="text-sm font-semibold mr-2 shrink-0">{% translate 'Välj:' %}</label>
                <select id="pdf-selector" data-xon.change="renderDoc($event.target.value, $event.target.options[$event.target.selectedIndex].dataset.mime)" autocomplete="off" class="bg-gray-200 dark:bg-gray-800 text-[#333333] dark:text-[#FAF9F6] border border-gray-600 rounded px-2 py-1 text-sm flex-1 w-full overflow-hidden text-ellipsis outline-hidden cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                {% for pdf in metadata.files.transcriptions.files %}
                    <option value="{{ pdf.url }}" data-mime="{{ pdf.mime_type }}">{{ pdf.type }} - {{ pdf.name }}</option>
                {% endfor %}
                </select>
            </div>
            <button data-xon.click="docOpen = false" class="ml-3 p-1.5 rounded-full hover:hover:text-orange-500 hover:bg-white/10 transition-colors shrink-0" title="Stäng dokument">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div id="pdf-iframe-wrapper" class="flex-1 min-h-0 w-full relative bg-[#F7F9F8] dark:bg-gray-800 text-[#333333] dark:text-[#FAF9F6]"></div>
    </div>
    {% endif %}
    
</aside>
<script src="{% static 'js/tify.js' %}"></script>
