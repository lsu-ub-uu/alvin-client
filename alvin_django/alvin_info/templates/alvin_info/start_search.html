{% load i18n %}
<div class="w-full flex flex-col p-8 py-6">
    <form action="{% url 'alvin_search' %}" method="get" class="w-full">
        <div class="relative bg-white dark:bg-gray-600 flex items-center rounded-full shadow-lg p-2 mb-5">
            <label for="search-query" class="sr-only">{% translate 'Sök' %}</label>
            <input 
                id="search-query"
                name="query" 
                class="font-normal rounded-full w-full py-4 pl-4 text-gray-700 dark:text-gray-100 bg-gray-100 dark:bg-gray-900 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 lg:text-base text-sm"
                type="text" 
                placeholder="{% translate 'Sök över en halv miljon objekt' %}" 
                value="{{ user_input|default:'' }}">
            
            <button 
                type="submit"
                class="bg-gray-900 p-2 hover:bg-dark-alvin mx-2 rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                aria-label="{% translate 'Sök' %}">
                <svg class="size-6 text-white" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
                </svg>
            </button>
        </div>

        <input type="hidden" name="searchType" value="alvinRecord">
        <input type="hidden" name="view" value="list">
    </form>
</div>
