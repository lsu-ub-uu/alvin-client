{% load i18n %}
<div class="w-full bg-white p-6 dark:bg-gray-800">
    <form action="{% url 'alvin_search'%}" method="get" role="search">
        <div class="sticky top-0 z-10 mb-5 flex w-full items-center justify-between rounded-full bg-white p-2 shadow-lg dark:bg-gray-700">
            <label for="search-input" class="sr-only">{% translate 'Sök' %}</label>
            <input id="search-input" name="query" class="w-full rounded-full bg-gray-100 py-4 pl-6 text-sm leading-tight text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-800 dark:text-gray-100 dark:focus:ring-blue-400 lg:text-base"
                type="search" placeholder="{% translate 'Sök över en halv miljon objekt' %}"
                {% if query %}
                value="{{ query }}"
                {% endif %}>
            <button type="submit" class="mx-2 rounded-full bg-gray-900 p-3 text-white hover:bg-dark-alvin focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-blue-400">
                <span class="sr-only">{% translate 'Sök' %}</span>
                <svg class="h-6 w-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
                    fill="currentColor" aria-hidden="true">
                    <title>{% translate 'Sökknapp' %}</title>
                    <path fill-rule="evenodd"
                        d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                        clip-rule="evenodd"/>
                </svg>
            </button>
        </div>
        <fieldset>
            <legend class="sr-only">{% translate 'Typ av sökning' %}</legend>
            <div class="flex flex-wrap justify-center gap-4 text-sm dark:text-white md:text-base">
                <div class="flex items-center">
                    <input type="radio" id="record" name="searchType" value="alvinRecord" class="h-4 w-4 border-gray-300 bg-gray-100 text-blue-600 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-blue-600" checked>
                    <label for="record" class="ml-2">
                        {% translate 'Post' %}
                    </label>
                </div>
                <div class="flex items-center">
                    <input type="radio" id="person" name="searchType" value="person" class="h-4 w-4 border-gray-300 bg-gray-100 text-blue-600 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-blue-600"
                        {% if searchType == 'person' %} checked{% endif %}>
                    <label for="person" class="ml-2">
                        {% translate 'Person' %}
                    </label>
                </div>
                <div class="flex items-center">
                    <input type="radio" id="organisation" name="searchType" value="organisation" class="h-4 w-4 border-gray-300 bg-gray-100 text-blue-600 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-blue-600"
                        {% if searchType == 'organisation' %} checked{% endif %}>
                    <label for="organisation" class="ml-2">
                        {% translate 'Organisation' %}
                    </label>
                </div>
                <div class="flex items-center">
                    <input type="radio" id="place" name="searchType" value="place" class="h-4 w-4 border-gray-300 bg-gray-100 text-blue-600 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-blue-600"
                        {% if searchType == 'place' %} checked{% endif %}>
                    <label for="place" class="ml-2">
                        {% translate 'Plats' %}
                    </label>
                </div>
                <div class="flex items-center">
                    <input type="radio" id="work" name="searchType" value="work" class="h-4 w-4 border-gray-300 bg-gray-100 text-blue-600 focus:ring-2 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-700 dark:ring-offset-gray-800 dark:focus:ring-blue-600"
                        {% if searchType == 'work' %} checked{% endif %}>
                    <label for="work" class="ml-2">
                        {% translate 'Verk' %}
                    </label>
                </div>
            </div>
        </fieldset>
        <input type="hidden" name="view" value="list">
    </form>
</div>
